<header class="page-heading">
    <h1>הודעות Snackbar</h1>
    <p>בדיקת משך הצגה, פעולות, סגירה ידנית ומיקום על המסך.</p>
</header>

<section class="snackbar-demo">
    <div class="snackbar-demo__description">
        <h2>התנהגות בסיסית</h2>
        <p>פתיחת הודעה חדשה סוגרת את ההודעה הפעילה, בדומה ל-Material Snackbar.</p>
    </div>

    <div class="snackbar-demo__actions">
        <button type="button" (click)="showTimed()">הודעה ל-3 שניות</button>
        <button type="button" (click)="showPersistent()">הודעה קבועה</button>
        <button type="button" (click)="showWithAction()">הודעה עם ביטול</button>
        <button type="button" class="snackbar-demo__dismiss" (click)="dismiss()">
            סגירת הודעה פעילה
        </button>
    </div>
</section>

<section class="snackbar-demo">
    <div class="snackbar-demo__description">
        <h2>מיקום</h2>
        <p>בדיקת נקודות העיגון הזמינות בכיוון RTL.</p>
    </div>

    <div class="snackbar-demo__positions">
        <button type="button" (click)="showAt('top', 'start')">עליון / התחלה</button>
        <button type="button" (click)="showAt('top', 'center')">עליון / מרכז</button>
        <button type="button" (click)="showAt('top', 'end')">עליון / סוף</button>
        <button type="button" (click)="showAt('bottom', 'start')">תחתון / התחלה</button>
        <button type="button" (click)="showAt('bottom', 'center')">תחתון / מרכז</button>
        <button type="button" (click)="showAt('bottom', 'end')">תחתון / סוף</button>
    </div>
</section>

<aside class="snackbar-demo__event" aria-live="polite">
    <strong>אירוע אחרון</strong>
    <span>{{ lastEvent() }}</span>
</aside>
