<button
    type="button"
    class="generate-btn"
    [class.generate-btn--attention]="attentionRequired()"
>
    <span class="generate-btn__waves" aria-hidden="true"></span>
    <span class="generate-btn__icon" aria-hidden="true" [innerHTML]="icon()"></span>
    <span class="generate-btn__label">{{ label() }}</span>
</button>
