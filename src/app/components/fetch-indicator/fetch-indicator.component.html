<svg
  class="indicator"
  [class.indicator--loading]="isLoading()"
  [class.indicator--settling-success]="isSettlingSuccess()"
  [class.indicator--success]="isSuccess()"
  [class.indicator--settling-error]="isSettlingError()"
  [class.indicator--error]="isError()"
  [attr.width]="size()"
  [attr.height]="size()"
  viewBox="0 0 24 24"
  fill="none"
  aria-hidden="true"
>
  <!-- Static ring that stays behind the active/loading/error glyphs. -->
  <circle
    class="indicator__track"
    cx="12"
    cy="12"
    r="8"
    [attr.stroke-width]="strokeWidth()"
  />

  <!-- Animated loading arc that spins until the request settles. -->
  <circle
    class="indicator__spinner"
    cx="12"
    cy="12"
    r="8"
    [attr.stroke-width]="strokeWidth()"
  />

  <!-- Short transition stroke that hands off the spinner into the success check. -->
  <path
    class="indicator__handoff"
    d="M10.2 5.9 C8.4 6.6 7.2 8.8 7.5 12.4"
    pathLength="100"
    [attr.stroke-width]="strokeWidth() / 1.8"
  />

  <!-- Final success glyph shown after the handoff finishes. -->
  <path
    class="indicator__glyph indicator__glyph--check"
    d="M7.5 12.4 10.5 15.3 16.8 8.8"
    pathLength="100"
    [attr.stroke-width]="strokeWidth() / 1.8"
  />

  <!-- First stroke of the error "X". -->
  <path
    class="indicator__glyph indicator__glyph--cross-a"
    d="M8 8 16 16"
    pathLength="100"
    [attr.stroke-width]="strokeWidth() / 1.8"
  />

  <!-- Second stroke of the error "X", delayed slightly for a staggered draw. -->
  <path
    class="indicator__glyph indicator__glyph--cross-b"
    d="M16 8 8 16"
    pathLength="100"
    [attr.stroke-width]="strokeWidth() / 1.8"
  />
</svg>
