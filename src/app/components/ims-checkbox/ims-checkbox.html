<label
    class="ims-cb"
    [class.ims-cb--checked]="isChecked() && !intermediate()"
    [class.ims-cb--intermediate]="intermediate()"
    [class.ims-cb--disabled]="disabled()"
    [class.ims-cb--ripple]="rippleActive()"
>
    <input
        class="ims-cb__native"
        type="checkbox"
        [attr.id]="id()"
        [checked]="isChecked() && !intermediate()"
        [indeterminate]="intermediate()"
        [disabled]="disabled()"
        [attr.aria-checked]="ariaChecked()"
        (change)="toggle()"
        (blur)="markAsTouched()"
    />

    <span class="ims-cb__track" aria-hidden="true">
        <span class="ims-cb__ripple"></span>

        <svg class="ims-cb__icon" viewBox="0 0 18 18" fill="none" focusable="false">
            <!--
                Single path shared by both the checkmark and the dash.
                CSS `d` transition morphs the shape between states.
                stroke-dashoffset drives the pen-draw / erase effect.
            -->
            <path
                class="ims-cb__mark"
                [attr.d]="svgPath()"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
    </span>

    <span class="ims-cb__label">
        <ng-content />
    </span>
</label>
